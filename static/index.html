<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nnU-Net Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-color: #252526;
            --accent-color: #007acc;
            --text-color: #cccccc;
            --border-color: #3e3e42;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .sidebar {
            width: 320px;
            background-color: var(--panel-color);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .logo { font-size: 1.2rem; font-weight: 600; color: #fff; margin-bottom: 5px; }
        .control-group {
            display: flex; flex-direction: column; gap: 10px; padding-bottom: 15px; border-bottom: 1px solid #333;
        }
        label { font-size: 0.9rem; font-weight: 600; color: #eee; }
        
        button {
            padding: 10px; background-color: var(--accent-color); color: white;
            border: none; border-radius: 4px; cursor: pointer; font-weight: 600;
        }
        button:hover { filter: brightness(1.1); }
        button:disabled { background-color: #555; cursor: not-allowed; opacity: 0.5; }
        button.secondary { background-color: #3e3e42; }

        .main-content {
            flex: 1; position: relative; background-color: #000;
            display: flex; justify-content: center; align-items: center;
        }
        
        #canvasContainer {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .layer {
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
        }
        #baseCanvas { display: block; } 
        
        /* 마스크 토글 시 부드러운 전환을 위해 transition 추가 */
        #drawCanvas { transition: opacity 0.2s; pointer-events: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">💻 nnU-Net Viewer</div>
        
        <div style="background:#333; padding:10px; border-radius:6px; font-size:0.85rem;">
            <div style="display:flex; justify-content:space-between;">
                <span>Server:</span><span id="serverStatus" style="color:orange;">Checking...</span>
            </div>
        </div>

        <div class="control-group">
            <label>1. Data Input</label>
            <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none">
            <button class="secondary" onclick="document.getElementById('folderInput').click()">📂 Open Folder</button>
        </div>

        <div class="control-group">
            <label>2. Slice Navigation</label>
            <div style="display:flex; gap:5px;">
                <button id="btnPrev" class="secondary" style="flex:1;" onclick="changeSlice(-1)" disabled>◀</button>
                <button id="btnNext" class="secondary" style="flex:1;" onclick="changeSlice(1)" disabled>▶</button>
            </div>
            <input type="range" id="sliceSlider" min="0" max="0" value="0" disabled oninput="onSliderChange(this.value)">
            <div style="text-align:right; font-size:0.85rem; color:#fff;" id="sliceInfo">0 / 0</div>
        </div>

        <div class="control-group">
            <label>3. Auto Segmentation</label>
            
            <div style="background: #333; padding: 10px; border-radius: 6px; margin-bottom: 10px; font-size: 0.85rem;">
                <div style="margin-bottom: 5px; color: #aaa;">통신 방식(Protocol) 선택:</div>
                <label style="display: block; margin-bottom: 5px; cursor: pointer; color: #fff;">
                    <input type="radio" name="commMode" value="polling" checked> 🔄 Task Queue (Polling)
                </label>
                <label style="display: block; cursor: pointer; color: #fff;">
                    <input type="radio" name="commMode" value="sse"> 🌊 SSE (Streaming)
                </label>
                <label style="display: block; cursor: pointer; color: #fff;">
                    <input type="radio" name="commMode" value="websocket"> ⚡ WebSocket (Full-Duplex)
                </label>
            </div>
            
            <button onclick="executeAutoSegment()" style="background-color: #ff9800; width: 100%;">🤖 Auto Segment 실행</button>
            
            <button class="secondary" onclick="toggleMask()" style="margin-top: 5px; width: 100%;">👁️ Toggle Mask (Space)</button>
            <button onclick="clearMask()" style="background-color:#d32f2f; margin-top:5px; width: 100%;">🗑️ Clear Canvas</button>
        </div>
    </div>

    <div class="main-content">
        <div id="placeholder" style="color:#555; font-size:1.2rem;">📂 Open a folder to start</div>
        
        <div id="canvasContainer" style="display:none;">
            <canvas id="baseCanvas"></canvas>
            <canvas id="drawCanvas" class="layer"></canvas>
        </div>
        
        <div id="loadingBox" style="display:none; position:absolute; background:rgba(0,0,0,0.7); color:white; padding:10px 20px; border-radius:5px; pointer-events:none; z-index:50;">
            Thinking... 🧠
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
