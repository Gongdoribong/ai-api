<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nnUNet-MedSAM2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-color: #252526;
            --accent-color: #007acc;
            --text-color: #cccccc;
            --border-color: #3e3e42;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .sidebar {
            width: 320px;
            background-color: var(--panel-color);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .logo { font-size: 1.2rem; font-weight: 600; color: #fff; margin-bottom: 5px; }
        .control-group {
            display: flex; flex-direction: column; gap: 10px; padding-bottom: 15px; border-bottom: 1px solid #333;
        }
        label { font-size: 0.9rem; font-weight: 600; color: #eee; }
        
        button {
            padding: 10px; background-color: var(--accent-color); color: white;
            border: none; border-radius: 4px; cursor: pointer; font-weight: 600;
        }
        button:hover { filter: brightness(1.1); }
        button:disabled { background-color: #555; cursor: not-allowed; opacity: 0.5; }
        button.secondary { background-color: #3e3e42; }
        button.active { background-color: #707070; border: 2px solid #fff; }

        .main-content {
            flex: 1; position: relative; background-color: #000;
            display: flex; justify-content: center; align-items: center;
        }
        
        #canvasContainer {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .layer {
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
        }
        #baseCanvas { display: block; } 
        
        /* [핵심 수정] 소스(src)가 없거나 비어있으면 아예 숨겨서 아이콘/테두리 방지 */
        #maskLayer { 
            pointer-events: none; 
            opacity: 0.7; 
            image-rendering: pixelated; 
            transition: opacity 0.2s; 
        }
        #maskLayer:not([src]), #maskLayer[src=""] {
            display: none; 
        }

        #drawCanvas { cursor: crosshair; touch-action: none; }

        #previewModal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center;
        }
        .modal-content {
            background:#252526; padding:25px; border-radius:12px; text-align:center; 
            border:1px solid #444; max-width:450px; width:90%;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">💻 nnUNet-MedSAM2</div>
        
        <div style="background:#333; padding:10px; border-radius:6px; font-size:0.85rem;">
            <div style="display:flex; justify-content:space-between;">
                <span>Server:</span><span id="serverStatus" style="color:orange;">Checking...</span>
            </div>
        </div>

        <div class="control-group">
            <label>1. Data Input</label>
            <button class="secondary" onclick="openFolder()">📂 Open Folder</button>
        </div>

        <div class="control-group">
            <label>2. Slice Navigation</label>
            <div style="display:flex; gap:5px;">
                <button id="btnPrev" class="secondary" style="flex:1;" onclick="changeSlice(-1)" disabled>◀</button>
                <button id="btnNext" class="secondary" style="flex:1;" onclick="changeSlice(1)" disabled>▶</button>
            </div>
            <input type="range" id="sliceSlider" min="0" max="0" value="0" disabled oninput="onSliderChange(this.value)">
            <div style="text-align:right; font-size:0.85rem; color:#fff;" id="sliceInfo">0 / 0</div>
        </div>

        <div class="control-group">
            <label>3. Segmentation Tools</label>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <button id="mode-scribble" class="active" onclick="setMode('scribble')">Mask</button>
                <button id="mode-box" class="secondary" onclick="setMode('box')">Box</button>
                <button id="mode-point" class="secondary" onclick="setMode('point')">Point</button>
            </div>

            <button class="secondary" onclick="toggleMask()" style="margin-top: 5px; background-color:#4CAF50;">▶ Segmentation</button>

            <div style="display:flex; gap:5px; margin-top:5px;">
                <button onclick="resetMask()" style="background-color:#d32f2f; flex:1;">🗑️ Clear</button>
                <button onclick="resetAllMasks()" style="background-color: darkred; color: white; flex:1;">Reset All</button>
            </div>
            
            <div style="margin-top: 15px; border-top: 1px solid #555; padding-top: 10px;">
                <label>💾 Save Options</label>
                <button onclick="saveCurrentMask()" style="background-color: #4CAF50; color: white; width: 100%; margin-top: 5px;">
                    💾 Save Current Mask (Disk)
                </button>
                <button onclick="saveVolume()" style="background-color:#9C27B0; width: 100%; margin-top: 5px;">
                    📚 Save 3D Volume (NIfTI)
                </button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div id="placeholder" style="color:#555; font-size:1.2rem;">📂 Open a folder to start</div>
        
        <div id="canvasContainer" style="display:none;">
            <canvas id="baseCanvas"></canvas>
            <img id="maskLayer" class="layer">
            <canvas id="drawCanvas" class="layer"></canvas>
        </div>
        
        <div id="loadingBox" style="display:none; position:absolute; background:rgba(0,0,0,0.7); color:white; padding:10px 20px; border-radius:5px; pointer-events:none; z-index:50;">
            Thinking... 🧠
        </div>
    </div>

    <div id="previewModal">
        <div class="modal-content">
            <h3 style="color:#fff; margin-top:0;">💾 Mask Saved!</h3>
            <p style="color:#ccc; font-size:0.9rem;">마스크가 서버에 저장되었습니다.</p>
            <div style="margin:15px 0; border:1px dashed #555; padding:10px; background:#000;">
                <img id="previewImg" style="max-width:100%; max-height:250px; border:1px solid #333; image-rendering: pixelated;">
            </div>
            <button onclick="closeModal()" style="width:100%;">확인 (OK)</button>
        </div>
    </div>

    <input type="file" id="folderInput" webkitdirectory directory style="display:none;">

    <script src="script.js"></script>
</body>
</html>
